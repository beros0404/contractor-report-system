# render.yaml
services:
  - type: web
    name: contractor-backend
    runtime: node
    repo: https://github.com/beros0404/contractor-report-system
    branch: main
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://tu-backend.onrender.com/api/auth/google/callback
      - key: FRONTEND_URL
        value: https://tu-frontend.vercel.app
      - key: OPENAI_API_KEY
        sync: false